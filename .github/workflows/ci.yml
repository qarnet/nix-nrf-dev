# CI — the "clone and it works" gate.
# Builds all packages (cached via Cachix qarnet), runs smoke tests, flake
# checks, template-init, devshell-enter, and TCL-parse tests for both flash
# recipes. Runs on PRs, pushes to main, and nightly (catches upstream
# openocd rev/hash drift).
name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # nightly — catches upstream openocd rev/hash drift

# Cancel in-progress runs on the same ref when a new run is triggered.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-25.11

      - uses: cachix/cachix-action@v17
        with:
          name: qarnet
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # A3 — flake eval + checks (fast, sandboxed). Runs treefmt check + pre-commit check.
      - name: Flake check
        run: nix flake check -L

      # A1 — build all packages. Cached after first run via Cachix.
      # openocd-master is ~10 min from source on first run; subsequent runs pull from cache.
      - name: Build packages
        run: nix build -L .#openocd-master-unwrapped .#openocd-master .#nrf-probes .#nrfutil-core

      # A2 — smoke-run: verify the built binaries actually execute.
      - name: Smoke run openocd
        run: nix run .#openocd-master -- --version
      - name: Smoke run nrf-probes
        run: nix run .#nrf-probes -- --help
      - name: Smoke run nrfutil
        run: nix run .#nrfutil-core -- --version

      # A5 — devshell-enter: verify the dogfood shell provides the tools.
      - name: Devshell provides tools
        run: nix develop --command sh -c "command -v openocd && command -v nrf-probes && nrf-probes --help"

      # A6 — TCL parse: openocd sources+parses the TCL before trying to talk
      # to a probe, so syntax errors surface distinctly from "no probe" errors.
      # No probe attached in CI → openocd exits non-zero at the "unable to open
      # CMSIS-DAP device" stage. We assert the failure is the probe-open stage
      # and NOT a TCL parse/syntax error.
      - name: TCL parse nRF53 recipe
        run: |
          set +e
          nix run .#openocd-master -- \
            -f interface/cmsis-dap.cfg \
            -c "transport select swd" \
            -c "adapter speed 1000" \
            -f target/nordic/nrf53.cfg \
            -f tcl/nrf53_flash.tcl \
            -c shutdown > /tmp/nrf53.log 2>&1
          rc=$?
          cat /tmp/nrf53.log
          # Fail if the error is a TCL/syntax error (not the expected no-probe error).
          if grep -qiE "syntax error|wrong # args|can't read|invalid command name" /tmp/nrf53.log; then
            echo "ERROR: TCL parse error detected" >&2
            exit 1
          fi
          # Expected: non-zero exit due to no probe, but no parse error.
          echo "OK: no TCL parse error (exit $rc was probe-open failure, expected)"
      - name: TCL parse nRF54L recipe
        run: |
          set +e
          nix run .#openocd-master -- \
            -f interface/cmsis-dap.cfg \
            -c "transport select swd" \
            -c "adapter speed 1000" \
            -f target/nordic/nrf54l.cfg \
            -f tcl/nrf54l_flash.tcl \
            -c shutdown > /tmp/nrf54l.log 2>&1
          rc=$?
          cat /tmp/nrf54l.log
          if grep -qiE "syntax error|wrong # args|can't read|invalid command name" /tmp/nrf54l.log; then
            echo "ERROR: TCL parse error detected" >&2
            exit 1
          fi
          echo "OK: no TCL parse error (exit $rc was probe-open failure, expected)"

      # A4 — template-init: verify `nix flake init -t` produces a working flake.
      - name: Template init
        run: |
          mkdir -p /tmp/tpltest
          cd /tmp/tpltest
          nix flake init -t github:qarnet/nix-nrf-dev
          nix flake check -L
          nix develop --command sh -c "command -v openocd && command -v nrf-probes"
